<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impero del Denaro - Guadagna Ora!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/fontsource-inter@5.0.16/index.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            overflow-x: hidden;
            user-select: none;
        }

        /* Animazione pulsante principale */
        .click-btn:active {
            transform: scale(0.95);
        }

        /* Effetto monete fluttuanti */
        .floating-text {
            position: absolute;
            color: #4ade80;
            font-weight: bold;
            font-size: 1.5rem;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.2); opacity: 0; }
        }

        /* Scrollbar personalizzata */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #4ade80;
            border-radius: 4px;
        }

        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(74, 222, 128, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <!-- Header con Immagine Generata -->
    <header class="w-full max-w-md relative mb-6">
        <img src="https://image.qwenlm.ai/public_source/fa78b338-791c-487a-bef8-2b53d6c78341/13703eca6-d289-411b-ac11-8e3e921e1b1e.png" alt="Money Empire" class="w-full h-48 object-cover rounded-b-3xl shadow-2xl shadow-green-500/20">
        <div class="absolute bottom-4 left-0 w-full text-center">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-yellow-400 drop-shadow-sm">
                IMPERO DEL DENARO
            </h1>
            <p class="text-xs text-gray-300 mt-1">Diventa milionario con un click!</p>
        </div>
    </header>

    <!-- Dashboard Principale -->
    <main class="w-full max-w-md px-4 flex flex-col gap-6 pb-20">
        
        <!-- Contatore Soldi -->
        <div class="bg-slate-800 rounded-2xl p-6 text-center shadow-lg border border-slate-700 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-green-500 to-yellow-500"></div>
            <p class="text-gray-400 text-sm uppercase tracking-wider font-semibold">Saldo Attuale</p>
            <h2 id="balance" class="text-5xl font-bold text-white mt-2 tracking-tight">€ 0</h2>
            <div class="mt-4 flex justify-center gap-4 text-sm">
                <div class="bg-slate-900 px-3 py-1 rounded-full border border-slate-700">
                    <span class="text-green-400 font-bold">€ <span id="per-second">0</span></span> / sec
                </div>
                <div class="bg-slate-900 px-3 py-1 rounded-full border border-slate-700">
                    <span class="text-yellow-400 font-bold">+€ <span id="per-click">1</span></span> / click
                </div>
            </div>
        </div>

        <!-- Area Click Gigante -->
        <div class="flex justify-center py-4">
            <button id="click-btn" class="click-btn w-48 h-48 rounded-full bg-gradient-to-br from-green-500 to-emerald-700 shadow-[0_0_40px_rgba(34,197,94,0.4)] flex flex-col items-center justify-center border-4 border-green-400 transition-all duration-100 relative group">
                <span class="text-6xl mb-1 group-hover:scale-110 transition-transform">💰</span>
                <span class="text-white font-bold text-lg uppercase tracking-widest">Guadagna</span>
            </button>
        </div>

        <!-- Sezione Negozi -->
        <div class="space-y-4">
            <h3 class="text-xl font-bold text-gray-200 flex items-center gap-2">
                <span>🚀</span> Investimenti & Upgrade
            </h3>
            
            <div id="shop-container" class="space-y-3">
                <!-- Gli oggetti verranno inseriti qui via JS -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="mt-auto py-6 text-center text-gray-500 text-xs">
        <p>© 2023 Impero del Denaro. Simulazione a scopo ludico.</p>
    </footer>

    <script>
        // --- Stato del Gioco ---
        let gameState = {
            balance: 0,
            incomePerSecond: 0,
            incomePerClick: 1,
            totalClicks: 0
        };

        // --- Configurazione Negozi ---
        const upgrades = [
            {
                id: 'click_boost',
                name: 'Caffè Espresso',
                description: '+1€ per click',
                baseCost: 15,
                costMultiplier: 1.5,
                count: 0,
                type: 'click',
                value: 1,
                icon: '☕'
            },
            {
                id: 'auto_laptop',
                name: 'Laptop Vecchio',
                description: '+2€ al secondo',
                baseCost: 100,
                costMultiplier: 1.4,
                count: 0,
                type: 'auto',
                value: 2,
                icon: '💻'
            },
            {
                id: 'auto_employee',
                name: 'Assumi un Amico',
                description: '+15€ al secondo',
                baseCost: 500,
                costMultiplier: 1.3,
                count: 0,
                type: 'auto',
                value: 15,
                icon: '👨‍💼'
            },
            {
                id: 'auto_crypto',
                name: 'Mining Crypto',
                description: '+100€ al secondo',
                baseCost: 2000,
                costMultiplier: 1.35,
                count: 0,
                type: 'auto',
                value: 100,
                icon: '₿'
            },
            {
                id: 'auto_factory',
                name: 'Fabbrica Soldi',
                description: '+500€ al secondo',
                baseCost: 10000,
                costMultiplier: 1.4,
                count: 0,
                type: 'auto',
                value: 500,
                icon: '🏭'
            }
        ];

        // --- Elementi DOM ---
        const balanceEl = document.getElementById('balance');
        const perSecondEl = document.getElementById('per-second');
        const perClickEl = document.getElementById('per-click');
        const clickBtn = document.getElementById('click-btn');
        const shopContainer = document.getElementById('shop-container');

        // --- Funzioni di Formattazione ---
        function formatMoney(amount) {
            return '€ ' + Math.floor(amount).toLocaleString('it-IT');
        }

        function getCost(upgrade) {
            return Math.floor(upgrade.baseCost * Math.pow(upgrade.costMultiplier, upgrade.count));
        }

        // --- Logica Core ---
        function updateUI() {
            balanceEl.textContent = formatMoney(gameState.balance);
            perSecondEl.textContent = gameState.incomePerSecond.toLocaleString('it-IT');
            perClickEl.textContent = gameState.incomePerClick.toLocaleString('it-IT');
            renderShop();
        }

        function renderShop() {
            shopContainer.innerHTML = '';
            upgrades.forEach((item, index) => {
                const currentCost = getCost(item);
                const canAfford = gameState.balance >= currentCost;
                
                const card = document.createElement('div');
                card.className = `bg-slate-800 p-4 rounded-xl border ${canAfford ? 'border-slate-600 cursor-pointer card-hover' : 'border-slate-800 opacity-60'} transition-all flex items-center justify-between`;
                
                if (canAfford) {
                    card.onclick = () => buyUpgrade(index);
                }

                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-slate-700 rounded-full flex items-center justify-center text-2xl">
                            ${item.icon}
                        </div>
                        <div>
                            <h4 class="font-bold text-white">${item.name}</h4>
                            <p class="text-xs text-gray-400">${item.description}</p>
                            <p class="text-xs text-green-400 mt-1">Posseduti: ${item.count}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="font-bold ${canAfford ? 'text-yellow-400' : 'text-red-400'}">
                            € ${currentCost.toLocaleString('it-IT')}
                        </div>
                        <button class="text-xs bg-slate-700 px-2 py-1 rounded mt-1 text-white ${canAfford ? '' : 'opacity-50'}">
                            Acquista
                        </button>
                    </div>
                `;
                shopContainer.appendChild(card);
            });
        }

        function buyUpgrade(index) {
            const item = upgrades[index];
            const cost = getCost(item);

            if (gameState.balance >= cost) {
                gameState.balance -= cost;
                item.count++;
                
                if (item.type === 'click') {
                    gameState.incomePerClick += item.value;
                } else {
                    gameState.incomePerSecond += item.value;
                }
                
                updateUI();
            }
        }

        // --- Gestione Click ---
        clickBtn.addEventListener('click', (e) => {
            gameState.balance += gameState.incomePerClick;
            gameState.totalClicks++;
            
            // Effetto visivo numero fluttuante
            const floatEl = document.createElement('div');
            floatEl.className = 'floating-text';
            floatEl.textContent = `+€${gameState.incomePerClick}`;
            
            // Posizionamento casuale leggero attorno al click
            const rect = clickBtn.getBoundingClientRect();
            const randomX = (Math.random() - 0.5) * 50;
            
            // Usiamo le coordinate del mouse o del centro se non disponibile
            const x = e.clientX || (rect.left + rect.width / 2);
            const y = e.clientY || (rect.top + rect.height / 2);
            
            floatEl.style.left = `${x + randomX}px`;
            floatEl.style.top = `${y - 20}px`;
            
            document.body.appendChild(floatEl);
            
            // Rimuovi elemento dopo animazione
            setTimeout(() => floatEl.remove(), 1000);
            
            updateUI();
        });

        // --- Loop Passivo (Reddito Automatico) ---
        setInterval(() => {
            if (gameState.incomePerSecond > 0) {
                // Aggiungiamo 1/10 del reddito ogni 100ms per fluidità
                const increment = gameState.incomePerSecond / 10;
                gameState.balance += increment;
                updateUI();
            }
        }, 100);

        // Inizializzazione
        updateUI();

    </script>
</body>
</html>
